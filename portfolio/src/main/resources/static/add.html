<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/pico.min.css">
    <title>Add ticker to Portfolio</title>
  </head>
  <body>
    <main class="container">
      <form>
  <fieldset>
    <label>
      Ticker Symbol
      <input
        type="text"
        name ="ticker" 
        required
      />
    </label>
    <label>
      Number of Shares
      <input
       type = "number" 
       name ="shares"
       step = "any"
       required
      />
    </label>
    <label>
      Share purchase price
      <input
       type = "number" 
       name ="purchasePrice"
       step = "0.01"
       required
      />
    </label>
  </fieldset>

  <input
    type="submit"
    value="Submit"
  />
</form>
    </main>
  </body>
</html>
